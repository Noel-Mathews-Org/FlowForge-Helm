apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://prometheus-community.github.io/helm-charts'
      chart: kube-prometheus-stack
      targetRevision: 58.2.1
      helm:
        valueFiles:
          - $values/infra/prom-values.yaml
    - repoURL: 'https://github.com/Noel-Mathews-Org/FlowForge-Helm.git'
      targetRevision: Cloud-Track-dev
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
