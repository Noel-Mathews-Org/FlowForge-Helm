apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: raw-manifests
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Noel-Mathews-Org/FlowForge-Helm.git'
    targetRevision: Cloud-Track-dev
    path: infra-manifests
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
