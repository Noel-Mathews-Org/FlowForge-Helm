apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://actions-runner-controller.github.io/actions-runner-controller'
      chart: actions-runner-controller
      targetRevision: 0.23.7
      helm:
        valueFiles:
          - $values/infra/arc-values.yaml
    - repoURL: 'https://github.com/Noel-Mathews-Org/FlowForge-Helm.git'
      targetRevision: Cloud-Track-dev
      ref: values
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: arc-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
