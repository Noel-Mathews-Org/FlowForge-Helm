apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Noel-Mathews-Org/FlowForge-Helm.git'
    targetRevision: Cloud-Track-dev
    path: argocd/infra-apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
