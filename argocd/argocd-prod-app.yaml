apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flowforge-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/Noel-Mathews-Org/FlowForge-Helm.git'
    targetRevision: main
    path: .
    helm:
      valueFiles:
        - values-common.yaml
        - values-prod.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: flowforge
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
