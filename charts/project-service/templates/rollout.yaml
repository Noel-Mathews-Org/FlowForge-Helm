apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    blueGreen:
      activeService: {{ .Release.Name }}-{{ .Chart.Name }}-active
      previewService: {{ .Release.Name }}-{{ .Chart.Name }}-preview
      autoPromotionEnabled: true
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Chart.Name }}
  template:
    metadata:
      labels:
        tier: backend
        app: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - {{ .Release.Name }}-{{ .Chart.Name }}
            topologyKey: "kubernetes.io/hostname"
      serviceAccountName: {{ .Release.Name }}-{{ .Chart.Name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          envFrom:
            - configMapRef:
                name: flowforge-config
            - secretRef:
                name: flowforge-secret
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: flowforge-config
                  key: DATABASE_URL_PROJECT
            - name: APP_PORT
              value: "8002"
            - name: GATEWAY_PORT
              value: "8002"
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
