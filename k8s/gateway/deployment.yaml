apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-gateway
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 50%
      maxSurge: 50%
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
      labels:
        tier: gateway
        app: flowforge-gateway
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: flowforge-gateway
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
        - name: gateway
          image: "flowforgeacrm9mp04.azurecr.io/flowforge/gateway:07f448b"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000

          envFrom:
            - configMapRef:
                name: flowforge-config

          env:
            - name: APP_PORT
              value: "8000"
            - name: GATEWAY_PORT
              value: "8000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

      nodeSelector:
        agentpool: node1
