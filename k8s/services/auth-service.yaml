apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowforge-auth-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flowforge-auth-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 50%
      maxSurge: 50%
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-python: "true"
      labels:
        tier: backend
        app: flowforge-auth-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: flowforge-auth-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
        - name: auth-service
          image: "flowforgeacrm9mp04.azurecr.io/flowforge/auth-service:8a3c80c"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001

          envFrom:
            - configMapRef:
                name: flowforge-config

          env:
            - name: APP_PORT
              value: "8001"
            - name: GATEWAY_PORT
              value: "8001"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10

      nodeSelector:
        agentpool: node1

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowforge-auth-service
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flowforge-auth-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: flowforge-auth-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8001

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowforge-auth-service
  namespace: default
  annotations:
    azure.workload.identity/client-id: "4b6676e9-5bf5-4f04-b5b7-83cf166d1bf3"
automountServiceAccountToken: false
