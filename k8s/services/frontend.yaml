apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: flowforge-frontend
  namespace: default
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: flowforge-frontend
  strategy:
    blueGreen:
      activeService: frontend
      previewService: frontend-preview
      autoPromotionEnabled: false
  template:
    metadata:
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "true"
      labels:
        tier: frontend
        app: flowforge-frontend
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: flowforge-frontend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001

      containers:
        - name: frontend
          image: "flowforgeacrm9mp04.azurecr.io/flowforge/frontend:47b4d87"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: flowforge-config

          env:
            - name: APP_PORT
              value: "3000"
            - name: GATEWAY_PORT
              value: "3000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

      nodeSelector:
        agentpool: node1

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flowforge-frontend
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: flowforge-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 4
        periodSeconds: 15
      selectPolicy: Max

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
spec:
  selector:
    app: flowforge-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-preview
  namespace: default
spec:
  selector:
    app: flowforge-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000


---
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowforge-frontend
  namespace: default
  annotations:
    azure.workload.identity/client-id: "4b6676e9-5bf5-4f04-b5b7-83cf166d1bf3"
automountServiceAccountToken: false
