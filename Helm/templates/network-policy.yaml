apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: flowforge-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {} 
  policyTypes:
    - Ingress
    - Egress
  
  ingress:
    - from:
        - podSelector: {}
          
    - from:
        - ipBlock:
            cidr: 10.1.1.0/24 # AppGW IP Range
    
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring

    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd

    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arc-system

    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cert-manager

  egress:
    - to:
        - podSelector: {}

    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

    - to:
        - ipBlock:
            cidr: 169.254.169.254/32  #Azure Managed Identity Token Fetching
      ports:
        - protocol: TCP
          port: 80

    - ports:
        - protocol: TCP
          port: 443

    - ports:
        - protocol: TCP
          port: 587

    - ports:
        - protocol: TCP
          port: 5432

    - ports:
        - protocol: TCP
          port: 10000
