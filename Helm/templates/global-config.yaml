apiVersion: v1
kind: ConfigMap
metadata:
  name: flowforge-config
  namespace: {{ .Values.global.namespace }}
data:
  AUTH_SERVICE_URL: "http://auth-service.{{ .Values.global.namespace }}.svc.cluster.local:80"
  PROJECT_SERVICE_URL: "http://project-service.{{ .Values.global.namespace }}.svc.cluster.local:80"
  TASK_SERVICE_URL: "http://task-service.{{ .Values.global.namespace }}.svc.cluster.local:80"
  ANALYTICS_SERVICE_URL: "http://analysis-service.{{ .Values.global.namespace }}.svc.cluster.local:80"
  GATEWAY_URL: "http://gateway.{{ .Values.global.namespace }}.svc.cluster.local:80"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  ALLOWED_ORIGINS: "http://localhost:3000,https://{{ .Values.global.domain }}"
  FRONTEND_URL: "https://{{ .Values.global.domain }}"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_FROM_EMAIL: "bloodymaryy77@gmail.com"
  SMTP_FROM_NAME: "FlowForge"
  AZURE_TENANT_ID: "{{ .Values.global.azure.tenantId }}"
  AZURE_MANAGED_IDENTITY_NAME: "{{ .Values.global.azure.managedIdentityName }}"
  AZURE_FOUNDRY_USE_MANAGED_IDENTITY: "true"
  AZURE_STORAGE_ACCOUNT_NAME: "{{ .Values.global.storage.accountName }}"
  AZURE_STORAGE_CONTAINER: "{{ .Values.global.storage.container }}"
  AZURE_STORAGE_USE_MANAGED_IDENTITY: "true"
  AZURE_KEYVAULT_URL: "{{ .Values.global.azure.keyvaultUrl }}"
  REDIS_PREFIX: "{{ .Values.global.environment }}_"
  AZURE_DB_USE_MANAGED_IDENTITY: "true"
  AZURE_POSTGRES_HOST: "{{ .Values.global.postgres.host }}"
  AZURE_POSTGRES_DB_NAME: "{{ .Values.global.postgres.dbName }}"
