apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- if .Values.aiManagedIdentityClientId }}
    azure.workload.identity/client-id: {{ .Values.aiManagedIdentityClientId | quote }}
    {{- else if .Values.global.azure.managedIdentityClientId }}
    azure.workload.identity/client-id: {{ .Values.global.azure.managedIdentityClientId | quote }}
    {{- end }}
automountServiceAccountToken: false
