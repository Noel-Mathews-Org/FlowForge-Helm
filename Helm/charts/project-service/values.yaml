replicaCount: 2

image:
  repository: ghcr.io/noel-mathews-org/flowforge/project-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8002

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
