apiVersion: v2
name: flowforge
description: Helm Umbrella Chart for FlowForge Microservices
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  - name: gateway
    version: 0.1.0
    repository: "file://./charts/gateway"
    condition: gateway.enabled
  - name: frontend
    version: 0.1.0
    repository: "file://./charts/frontend"
    condition: frontend.enabled
  - name: auth-service
    version: 0.1.0
    repository: "file://./charts/auth-service"
    condition: auth-service.enabled
  - name: project-service
    version: 0.1.0
    repository: "file://./charts/project-service"
    condition: project-service.enabled
  - name: task-service
    version: 0.1.0
    repository: "file://./charts/task-service"
    condition: task-service.enabled
  - name: analysis-service
    version: 0.1.0
    repository: "file://./charts/analysis-service"
    condition: analysis-service.enabled
  - name: notification-worker
    version: 0.1.0
    repository: "file://./charts/notification-worker"
    condition: notification-worker.enabled
