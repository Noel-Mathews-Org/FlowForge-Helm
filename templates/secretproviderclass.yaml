apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: flowforge-keyvault
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true" # Set this to true as AKS nodes use Managed Identity, or Workload Identity based on setup. Defaulting to true for AKS managed identity.
    userAssignedIdentityID: ""    # Leave empty to use system assigned managed identity or the cluster identity if standard.
    keyvaultName: "{{ .Values.global.azure.keyvaultName }}"
    objects:  |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
        - |
          objectName: internal-api-key
          objectType: secret
        - |
          objectName: entra-client-secret
          objectType: secret
        - |
          objectName: azure-foundry-key
          objectType: secret
        - |
          objectName: smtp-password
          objectType: secret
        - |
          objectName: azure-storage-connection-string
          objectType: secret
        - |
          objectName: database-password
          objectType: secret
        - |
          objectName: redis-password
          objectType: secret
    tenantId: "{{ .Values.global.azure.tenantId }}"
  # Instruct the CSI driver to create a Kubernetes Secret
  secretObjects:
  - secretName: flowforge-secret
    type: Opaque
    data:
    - key: JWT_SECRET
      objectName: jwt-secret
    - key: INTERNAL_API_KEY
      objectName: internal-api-key
    - key: ENTRA_CLIENT_SECRET
      objectName: entra-client-secret
    - key: AZURE_FOUNDRY_KEY
      objectName: azure-foundry-key
    - key: SMTP_PASSWORD
      objectName: smtp-password
    - key: AZURE_STORAGE_CONNECTION_STRING
      objectName: azure-storage-connection-string
    - key: DATABASE_PASSWORD
      objectName: database-password
    - key: REDIS_PASSWORD
      objectName: redis-password
