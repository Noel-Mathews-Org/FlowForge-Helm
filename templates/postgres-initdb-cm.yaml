apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: {{ .Release.Namespace }}
data:
  initdb.sql: |
    CREATE DATABASE auth_db;
    CREATE DATABASE project_db;
    CREATE DATABASE task_db;
    CREATE DATABASE analytics_db;
    
    \c auth_db
    
    DO $$ 
    BEGIN
        IF NOT EXISTS (SELECT 1 FROM pg_type WHERE typname = 'user_role') THEN
            CREATE TYPE user_role AS ENUM ('admin', 'manager', 'member');
        END IF;
    END $$;
    
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
        email VARCHAR(255) UNIQUE NOT NULL,
        hashed_password VARCHAR(255) NOT NULL,
        full_name VARCHAR(255) NOT NULL,
        role user_role NOT NULL,
        org VARCHAR(255) NOT NULL DEFAULT 'stratum',
        is_active BOOLEAN NOT NULL DEFAULT TRUE,
        created_at TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT NOW()
    );
    
    INSERT INTO users (email, hashed_password, full_name, role, org) VALUES
    ('admin@flow.com',   '$2b$12$w68BjCU2O021Ofy7pLZo1ehupQC9IMsumwoHuPhh9keQYigqN9RqO', 'Admin User',   'admin',   'flowforge'),
    ('manager@flow.com', '$2b$12$w68BjCU2O021Ofy7pLZo1ehupQC9IMsumwoHuPhh9keQYigqN9RqO', 'Manager User', 'manager', 'flowforge'),
    ('user@flow.com',    '$2b$12$w68BjCU2O021Ofy7pLZo1ehupQC9IMsumwoHuPhh9keQYigqN9RqO', 'Regular User', 'member',  'flowforge')
    ON CONFLICT (email) DO NOTHING;
