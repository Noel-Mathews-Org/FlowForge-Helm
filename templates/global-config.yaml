apiVersion: v1
kind: ConfigMap
metadata:
  name: flowforge-config
  namespace: {{ .Release.Namespace }}
data:
  # Internal Networking
  AUTH_SERVICE_URL: "http://auth-service:80"
  PROJECT_SERVICE_URL: "http://project-service:80"
  TASK_SERVICE_URL: "http://task-service:80"
  ANALYTICS_SERVICE_URL: "http://analysis-service:80"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  GATEWAY_PORT: "8000"
  ALLOWED_ORIGINS: "http://localhost:3000,https://{{ .Values.global.domain }}"
  
  # Mail Config
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "bloodymaryy77@gmail.com"
  SMTP_FROM_NAME: "FlowForge"
  SMTP_FROM_EMAIL: "bloodymaryy77@gmail.com"
  FRONTEND_URL: "https://{{ .Values.global.domain }}"
  
  # Database Config
  DATABASE_URL_AUTH: "postgres://postgres:postgres@postgres:5432/auth_db"
  DATABASE_URL_PROJECT: "postgres://postgres:postgres@postgres:5432/project_db"
  DATABASE_URL_TASK: "postgres://postgres:postgres@postgres:5432/task_db"
  DATABASE_URL_ANALYTICS: "postgres://postgres:postgres@postgres:5432/analytics_db"
  REDIS_URL: "redis://redis:6379"

  # App Port
  APP_PORT: "80"
