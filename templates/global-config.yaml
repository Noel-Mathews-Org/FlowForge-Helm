apiVersion: v1
kind: ConfigMap
metadata:
  name: flowforge-config
  namespace: {{ .Release.Namespace }}
data:
  AUTH_SERVICE_URL: "http://auth-service:80"
  PROJECT_SERVICE_URL: "http://project-service:80"
  TASK_SERVICE_URL: "http://task-service:80"
  ANALYTICS_SERVICE_URL: "http://analysis-service:80"
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW_SECONDS: "60"
  GATEWAY_PORT: "8000"
  ALLOWED_ORIGINS: "http://localhost:3000,https://{{ .Values.global.domain }}"
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "bloodymaryy77@gmail.com"
  SMTP_FROM_EMAIL: "bloodymaryy77@gmail.com"
  SMTP_FROM_NAME: "FlowForge"
  FRONTEND_URL: "https://{{ .Values.global.domain }}"
  APP_PORT: "80"
  ENTRA_TENANT_ID: "{{ .Values.global.azure.tenantId }}"
  ENTRA_CLIENT_ID: "{{ .Values.global.entra.clientId }}"
  ENTRA_GROUP_PLATFORM_ADMIN: "{{ .Values.global.entra.groupPlatformAdmin }}"
  ENTRA_GROUP_ORG_OWNER: "{{ .Values.global.entra.groupOrgOwner }}"
  ENTRA_GROUP_MANAGER: "{{ .Values.global.entra.groupManager }}"
  ENTRA_GROUP_MEMBER: "{{ .Values.global.entra.groupMember }}"
  AZURE_FOUNDRY_ENDPOINT: "{{ .Values.global.ai.endpoint }}"
  AZURE_FOUNDRY_DEPLOYMENT: "{{ .Values.global.ai.deployment }}"
  AZURE_FOUNDRY_USE_MANAGED_IDENTITY: "true"
  AZURE_STORAGE_ACCOUNT_NAME: "{{ .Values.global.storage.accountName }}"
  AZURE_STORAGE_CONTAINER: "{{ .Values.global.storage.container }}"
  AZURE_STORAGE_USE_MANAGED_IDENTITY: "false" # True if using workload identity, false if connection string is used (which it is, via Secret)
  AZURE_KEYVAULT_URL: "{{ .Values.global.azure.keyvaultUrl }}"
