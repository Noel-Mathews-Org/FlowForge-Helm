apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flowforge-routes
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: flowforge-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - name: {{ .Release.Name }}-gateway-active
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ .Release.Name }}-frontend-active
      port: 80
