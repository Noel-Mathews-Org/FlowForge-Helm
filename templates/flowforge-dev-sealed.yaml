{{- if eq .Release.Namespace "dev" }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: flowforge-secret
  namespace: dev
spec:
  encryptedData:
    DATABASE_PASSWORD: {{ .Values.sealedSecrets.dev.DATABASE_PASSWORD | default "" }}
    JWT_SECRET: {{ .Values.sealedSecrets.dev.JWT_SECRET | default "" }}
    SMTP_PASSWORD: {{ .Values.sealedSecrets.dev.SMTP_PASSWORD | default "" }}
  template:
    metadata:
      name: flowforge-secret
      namespace: dev
{{- end }}
